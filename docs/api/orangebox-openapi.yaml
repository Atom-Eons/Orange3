  "components": {
    "securitySchemes": {
      "adminBearer": {
        "type": "http",
        "scheme": "bearer",
        "description": "Use ORANGEBOX_ADMIN_TOKEN for local admin-gated routes."
      }
    },
    "schemas": {
      "DoctorResult": {
        "type": "object",
        "properties": {
          "ok": {
            "type": "boolean"
          },
          "summary": {
            "type": "object"
          },
          "checks": {
            "type": "array"
          }
        }
      },
      "FinalGreenBoardLatest": {
        "type": "object",
        "description": "Latest or freshly run ORANGEBOX finish-line board. The latest-board route intentionally returns compact check evidence so AE Operations can explain recovery state without transferring huge probe bodies.",
        "properties": {
          "ok": {
            "type": "boolean"
          },
          "found": {
            "type": "boolean"
          },
          "version": {
            "type": "string"
          },
          "receipt_path": {
            "type": [
              "string",
              "null"
            ]
          },
          "receipt_modified_at": {
            "type": [
              "string",
              "null"
            ]
          },
          "receipt_bytes": {
            "type": [
              "integer",
              "null"
            ]
          },
          "started_at": {
            "type": [
              "string",
              "null"
            ]
          },
          "finished_at": {
            "type": [
              "string",
              "null"
            ]
          },
          "full": {
            "type": "boolean"
          },
          "require_clean": {
            "type": "boolean"
          },
          "summary": {
            "$ref": "#/components/schemas/FinalGreenBoardSummary"
          },
          "product_language": {
            "type": [
              "object",
              "null"
            ]
          },
          "package_manifest": {
            "type": [
              "string",
              "null"
            ]
          },
          "package": {
            "type": [
              "object",
              "null"
            ]
          },
          "failures": {
            "type": "array",
            "items": {
              "type": "object"
            }
          },
          "advisories": {
            "type": "array",
            "items": {
              "type": "object"
            }
          },
          "checks": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/FinalGreenBoardCheck"
            }
          }
        },
        "required": [
          "ok",
          "summary",
          "checks"
        ]
      },
      "FinalGreenBoardSummary": {
        "type": "object",
        "properties": {
          "checks": {
            "type": "integer"
          },
          "passed": {
            "type": "integer"
          },
          "failed": {
            "type": "integer"
          },
          "warnings": {
            "type": "integer"
          },
          "advisory_count": {
            "type": "integer"
          },
          "advisory_warnings": {
            "type": "integer"
          }
        }
      },
      "FinalGreenBoardCheck": {
        "type": "object",
        "properties": {
          "name": {
            "type": "string"
          },
          "ok": {
            "type": "boolean"
          },
          "status": {
            "type": "string"
          },
          "required": {
            "type": "boolean"
          },
          "duration_ms": {
            "type": "number"
          },
          "summary": {
            "type": [
              "object",
              "null"
            ]
          },
          "evidence": {
            "oneOf": [
              {
                "$ref": "#/components/schemas/ServiceFreshnessBoardEvidence"
              },
              {
                "type": "null"
              }
            ],
            "description": "Present for the service_freshness check; omitted or null for most compact checks."
          },
          "recovery": {
            "type": [
              "object",
              "null"
            ]
          }
        },
        "required": [
          "name",
          "ok",
          "status"
        ]
      },
      "ServiceFreshnessBoardEvidence": {
        "type": "object",
        "description": "Compact Service Freshness evidence exposed through /api/v4/finish/latest for AE Operations recovery UI.",
        "properties": {
          "ok": {
            "type": "boolean"
          },
          "version": {
            "type": [
              "string",
              "null"
            ]
          },
          "status": {
            "type": [
              "string",
              "null"
            ],
            "enum": [
              "fresh",
              "restart_required",
              "unavailable",
              "warning",
              "review",
              null
            ]
          },
          "read_only": {
            "type": "boolean"
          },
          "summary": {
            "type": [
              "object",
              "null"
            ],
            "properties": {
              "routes": {
                "type": "integer"
              },
              "passed": {
                "type": "integer"
              },
              "failed": {
                "type": "integer"
              },
              "restart_required": {
                "type": "boolean"
              },
              "source_routes_checked": {
                "type": "integer"
              },
              "source_routes_present": {
                "type": "integer"
              },
              "stale_installed_routes": {
                "type": "integer"
              }
            }
          },
          "source_routes": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/ServiceFreshnessSourceRoute"
            }
          },
          "failures": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/ServiceFreshnessFailure"
            }
          },
          "recovery": {
            "oneOf": [
              {
                "$ref": "#/components/schemas/ServiceFreshnessRecovery"
              },
              {
                "type": "null"
              }
            ]
          },
          "recovery_action": {
            "type": [
              "string",
              "null"
            ]
          },
          "safe_commands": {
            "type": "array",
            "items": {
              "type": "string"
            }
          },
          "receipt_path": {
            "type": [
              "string",
              "null"
            ]
          }
        }
      },
      "ServiceFreshnessSourceRoute": {
        "type": "object",
        "properties": {
          "id": {
            "type": [
              "string",
              "null"
            ]
          },
          "path": {
            "type": [
              "string",
              "null"
            ]
          },
          "present": {
            "type": "boolean"
          },
          "diagnosis": {
            "type": [
              "string",
              "null"
            ]
          },
          "file": {
            "type": [
              "string",
              "null"
            ]
          }
        }
      },
      "ServiceFreshnessFailure": {
        "type": "object",
        "properties": {
          "id": {
            "type": [
              "string",
              "null"
            ]
          },
          "method": {
            "type": [
              "string",
              "null"
            ]
          },
          "path": {
            "type": [
              "string",
              "null"
            ]
          },
          "purpose": {
            "type": [
              "string",
              "null"
            ]
          },
          "status": {
            "type": [
              "integer",
              "null"
            ]
          },
          "diagnosis": {
            "type": [
              "string",
              "null"
            ]
          },
          "source_route": {
            "oneOf": [
              {
                "$ref": "#/components/schemas/ServiceFreshnessSourceRoute"
              },
              {
                "type": "null"
              }
            ]
          }
        }
      },
      "ServiceFreshnessRecovery": {
        "type": "object",
        "properties": {
          "status": {
            "type": [
              "string",
              "null"
            ]
          },
          "read_only": {
            "type": "boolean"
          },
