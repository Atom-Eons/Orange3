            "type": [
              "string",
              "null"
            ]
          },
          "stale_installed_routes": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "id": {
                  "type": [
                    "string",
                    "null"
                  ]
                },
                "path": {
                  "type": [
                    "string",
                    "null"
                  ]
                },
                "source_file": {
                  "type": [
                    "string",
                    "null"
                  ]
                }
              }
