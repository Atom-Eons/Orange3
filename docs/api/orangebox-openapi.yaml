    "/api/v4/finish/closeout-plan": {
      "get": {
        "operationId": "getReleaseCloseoutPlan",
          "summary": "Build the read-only release-candidate closeout plan: package hash, proof board status, git review groups, exact stage/hold curation paths, approval gates, and rollback path.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Release closeout plan generated. ok=false means operator review is still required; the command itself remained read-only."
          }
        }
      }
    },
    "/api/v4/finish/decision-card": {
      "get": {
        "operationId": "writeReleaseDecisionCard",
        "summary": "Write a plain-English release decision card from the latest package, board, closeout, and git review state.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Decision card written and promotion is not blocked by release gates."
          },
          "409": {
            "description": "Decision card written; release promotion still requires operator review."
          }
        }
      }
    },
    "/api/v4/finish/path-lists": {
      "get": {
