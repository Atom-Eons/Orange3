    "/api/v4/finish/latest": {
      "get": {
        "operationId": "getLatestFinalGreenBoard",
        "summary": "Read the latest ORANGEBOX finish-line proof board receipt without rerunning expensive proof gates.",
        "responses": {
          "200": {
            "description": "Latest finish-line proof board",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/FinalGreenBoardLatest"
                }
              }
            }
          },
          "404": {
            "description": "No finish-line proof board receipt exists yet"
          }
        }
      }
    },
    "/api/v4/finish/process-doctor": {
      "get": {
        "operationId": "runProcessHygieneDoctor",
        "summary": "Run the read-only ORANGEBOX process hygiene doctor with an approval-gated recovery plan.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Process hygiene passed"
          },
          "409": {
            "description": "Process hygiene failed"
          }
        }
      }
    },
    "/api/v4/finish/feature-reality": {
      "get": {
        "operationId": "runFeatureRealityDoctor",
        "summary": "Run the anti-theater Bluebird feature reality matrix: source, command, API, receipt, screenshot, package, and blocker evidence.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Feature reality matrix has no failed features or critical theater hits. Watch items may remain visible."
          },
          "409": {
            "description": "One or more promised features lack implementation/proof evidence, or a critical theater hit exists."
          }
        }
      }
    },
    "/api/v4/finish/user-journey": {
      "get": {
        "operationId": "runUserJourneyDoctor",
        "summary": "Simulate the ORANGEBOX box-map user journeys and report exactly where a user gets blocked.",
