            "description": "Release packet written and promotion is not blocked by release gates."
          },
          "409": {
            "description": "Release packet written; release promotion still requires operator review."
          }
        }
      }
    },
    "/api/v4/finish/green-board": {
      "get": {
        "operationId": "runFinalGreenBoard",
        "summary": "Run the complete ORANGEBOX finish-line proof board from AE Operations.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          },
          {
            "name": "full",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          },
          {
            "name": "require_clean",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Finish-line board passed",
