{
  "openapi": "3.1.0",
  "info": {
    "title": "ORANGEBOX AE See-Suite API",
    "version": "6.3.0-alpha.8-contract",
    "description": "Canonical ORANGEBOX v4 contract for AE See-Suite, AE Operations, CLI, MCP, Claude handoff, receipts, and Silent Canvas proof routes. This file is JSON-in-YAML so it remains valid YAML while parsing without a runtime dependency."
  },
  "servers": [
    {
      "url": "http://127.0.0.1:8787",
      "description": "Local ORANGEBOX sidecar"
    }
  ],
  "paths": {
    "/api/v4/openapi.json": {
      "get": {
        "operationId": "getOpenApiContract",
        "summary": "Return the canonical ORANGEBOX OpenAPI contract.",
        "responses": {
          "200": {
            "description": "OpenAPI document"
          }
        }
      }
    },
    "/api/v4/api/doctor": {
      "get": {
        "operationId": "runApiDoctor",
        "summary": "Run the OpenAPI contract doctor and report drift.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Doctor passed"
          },
          "409": {
            "description": "Doctor failed"
          }
        }
      }
    },
    "/api/v4/model-switch/status": {
      "get": {
        "operationId": "getModelSwitchboardStatus",
        "summary": "Return the active Running Brain profile and GPT, Opus, Grok, Gemini readiness without making model calls.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Switchboard status"
          },
          "409": {
            "description": "Switchboard status failed"
          }
        }
      }
    },
    "/api/v4/model-switch/select": {
      "post": {
        "operationId": "selectModelSwitchboardProfile",
        "summary": "Select the active Running Brain profile; writes local config and optional receipt, but makes no model call.",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "profile_id": {
                    "type": "string",
                    "enum": [
                      "gpt",
                      "opus",
                      "grok",
                      "gemini",
                      "grok-superheavy"
                    ]
                  },
                  "receipt": {
                    "type": "boolean"
                  },
                  "reason": {
                    "type": "string"
                  }
                },
                "required": [
                  "profile_id"
                ]
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Profile selected"
          },
          "400": {
            "description": "Invalid profile"
          }
        }
      }
    },
    "/api/v4/model-switch/doctor": {
      "get": {
        "operationId": "runModelSwitchboardDoctor",
        "summary": "Prove Running Brain profiles, no-token probes, route preference, persistence, and skill reporting.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Doctor passed"
          },
          "409": {
            "description": "Doctor failed"
          }
        }
      }
    },
    "/api/v4/aelang/doctor": {
      "get": {
        "operationId": "runAELangDoctor",
        "summary": "Prove AELang spec normalization, High-to-Core compile, Core route packet validation, and Operating Spine mapping.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "AELang doctor passed"
          },
          "409": {
            "description": "AELang doctor failed"
          }
        }
      }
    },
    "/api/v4/aelang/compile": {
      "post": {
        "operationId": "compileAELang",
        "summary": "Compile AELang-High or AELang-Core into an ORANGEBOX route packet and Operating Spine handoff object.",
        "requestBody": {
          "required": false,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "source": {
                    "type": "string"
                  },
                  "tier": {
                    "type": "string",
                    "enum": [
                      "auto",
                      "high",
                      "core"
                    ]
                  },
                  "receipt": {
                    "type": "boolean"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "AELang compiled"
          },
          "400": {
            "description": "AELang validation failed"
          }
        }
      }
    },
    "/api/v4/install/doctor": {
      "get": {
        "operationId": "runInstallClarityDoctor",
        "summary": "Run the Basic Install vs Advanced AI Computer clarity doctor.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Install clarity passed"
          },
          "409": {
            "description": "Install clarity failed"
          }
        }
      }
    },
    "/api/v4/install/rehearsal": {
      "get": {
        "operationId": "runInstallRehearsal",
        "summary": "Run a clean one-machine Basic Install rehearsal from a fresh data root.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          },
          {
            "name": "clean_temp",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Clean Basic Install rehearsal passed"
          },
          "409": {
            "description": "Clean Basic Install rehearsal failed"
          }
        }
      }
    },
    "/api/v4/install/rehearsal/latest": {
      "get": {
        "operationId": "getLatestInstallRehearsal",
        "summary": "Return the latest persisted clean Basic Install rehearsal proof without running a new rehearsal.",
        "parameters": [
          {
            "name": "limit",
            "in": "query",
            "schema": {
              "type": "integer",
              "minimum": 1,
              "maximum": 50
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Latest clean Basic Install rehearsal proof found"
          },
          "404": {
            "description": "No clean Basic Install rehearsal proof found"
          }
        }
      }
    },
    "/api/v4/install/recovery-guide": {
      "get": {
        "operationId": "getInstallRecoveryGuide",
        "summary": "Return the read-only AE Operations repair, rollback, process, package, and vault recovery guide.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Recovery guide returned"
          }
        }
      }
    },
    "/api/v4/install/service-freshness": {
      "get": {
        "operationId": "runInstallServiceFreshness",
        "summary": "Verify the running sidecar has the routes AE Operations expects.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          },
          {
            "name": "base_url",
            "in": "query",
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Running service is fresh"
          },
          "409": {
            "description": "Running service is stale, unavailable, or needs review"
          }
        }
      }
    },
    "/api/v4/install/service-freshness/latest": {
      "get": {
        "operationId": "getLatestInstallServiceFreshness",
        "summary": "Return the latest persisted Service Freshness proof without probing the live sidecar.",
        "parameters": [
          {
            "name": "limit",
            "in": "query",
            "schema": {
              "type": "integer",
              "minimum": 1,
              "maximum": 50
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Latest Service Freshness proof found"
          },
          "404": {
            "description": "No Service Freshness proof found"
          }
        }
      }
    },
    "/api/v4/product-language/doctor": {
      "get": {
        "operationId": "runProductLanguageDoctor",
        "summary": "Verify AE See-Suite and AE Operations product-facing language and report hidden compatibility debt.",
        "parameters": [
          {
            "name": "receipt",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          },
          {
            "name": "base_url",
            "in": "query",
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "include_mutation_smoke",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "0",
                "1"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Product language gate passed"
          },
          "409": {
            "description": "Product language gate found stale buyer-facing language or route/API copy drift"
